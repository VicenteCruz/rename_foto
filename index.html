<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizador de Fotos</title>
    <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --drone-forest: #2a503a;
            --drone-teal: #266b7a;
            --drone-sand: #dfc098;
            --drone-deep: #143852;

            --deep-navy: #143852;
            --liquid-blue: #266b7a;
            --liquid-red: #dfc098;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-bright: rgba(255, 255, 255, 0.18);
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--drone-forest) 0%, var(--drone-teal) 35%, var(--drone-sand) 55%, var(--drone-deep) 100%);
            background-size: 200% 200%;
            animation: landscapeShift 35s infinite alternate ease-in-out;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2vh 20px;
            color: var(--text);
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Abstract Drone Landscape & Light Spot elements */
        .liquid-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.85;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            mix-blend-mode: screen;
            animation: drift 25s infinite alternate ease-in-out;
        }

        .b1 {
            width: 800px;
            height: 800px;
            top: -20%;
            left: -20%;
            background: radial-gradient(circle, rgba(20, 46, 32, 0.95) 0%, rgba(20, 46, 32, 0) 70%);
            animation-duration: 35s;
        }

        .b2 {
            width: 700px;
            height: 700px;
            bottom: -15%;
            right: -15%;
            background: radial-gradient(circle, rgba(203, 162, 117, 0.5) 0%, rgba(203, 162, 117, 0) 70%);
            animation-duration: 28s;
        }

        .b3 {
            width: 600px;
            height: 600px;
            top: 25%;
            left: 45%;
            background: radial-gradient(circle, rgba(24, 72, 82, 0.8) 0%, rgba(24, 72, 82, 0) 70%);
            animation-duration: 40s;
        }

        /* Focos de Luz / Lens Flare Glares */
        .light-spot {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.7) 0%, rgba(255, 240, 200, 0.35) 15%, rgba(255, 255, 255, 0) 65%);
            mix-blend-mode: overlay;
            filter: blur(25px);
            pointer-events: none;
            z-index: 2;
            animation: float-flare 18s infinite alternate ease-in-out;
        }

        .s1 {
            width: 180px;
            height: 180px;
            top: 15%;
            left: 15%;
            animation-duration: 20s;
        }

        .s2 {
            width: 280px;
            height: 280px;
            bottom: 25%;
            right: 20%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, rgba(200, 245, 255, 0.3) 20%, rgba(255, 255, 255, 0) 60%);
            animation-duration: 30s;
            animation-delay: -5s;
        }

        .s3 {
            width: 100px;
            height: 100px;
            top: 55%;
            left: 5%;
            animation-duration: 15s;
            animation-delay: -2s;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                transform: translate(80px, 60px) scale(1.1) rotate(20deg);
            }
        }

        @keyframes float-flare {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 0.25;
            }
            50% {
                opacity: 0.75;
            }
            100% {
                transform: translate(120px, -70px) scale(1.2) rotate(45deg);
                opacity: 0.35;
            }
        }

        @keyframes landscapeShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .main-container {
            max-width: 850px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border-radius: 40px;
            padding: 2.5rem;
            position: relative;
            box-shadow:
                0 15px 35px rgba(0, 0, 0, 0.15),
                inset 0 1px 1px var(--glass-bright);
            border: 1px solid var(--border);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 0.8rem;
            letter-spacing: 5px;
            opacity: 0.5;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .step-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .liquid-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: relative;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
        }

        .liquid-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        .icon {
            font-size: 2.2rem;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        .path-info {
            font-size: 0.75rem;
            opacity: 0.4;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 300;
        }

        .settings-pane {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #94a3b8;
        }

        input[type="text"],
        input[type="number"] {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 15px;
            width: 100%;
            outline: none;
            color: white;
            font-family: inherit;
            transition: all 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #fff;
        }

        .check-box {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 15px;
            color: #cbd5e1;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--liquid-blue);
            cursor: pointer;
        }

        .execute-btn {
            background: #fff;
            color: var(--deep-navy);
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.4s;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .execute-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        #status-area {
            margin-top: 15px;
            text-align: center;
        }

        #prog-track {
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }

        #prog-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 15px #fff;
        }

        #log-feed {
            max-height: 80px;
            overflow-y: auto;
            font-size: 0.75rem;
            opacity: 0.4;
            margin-top: 10px;
            text-align: left;
        }

        .time-box {
            display: flex;
            gap: 10px;
        }
    </style>
</head>

<body>
    <div class="liquid-layer">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
        <div class="light-spot s1"></div>
        <div class="light-spot s2"></div>
        <div class="light-spot s3"></div>
    </div>

    <div class="main-container">
        <header>
            <h1>Organizador de Fotos</h1>
            <div class="tagline"></div>
        </header>

        <div class="step-grid">
            <button class="liquid-btn" onclick="selectFolder('source')">
                <span class="icon">📂</span>
                <span style="font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Fotos de Origem</span>
                <div id="source-path" class="path-info">Selecionar Pasta</div>
            </button>
            <button class="liquid-btn" onclick="selectFolder('dest')">
                <span class="icon">💽</span>
                <span style="font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Destino</span>
                <div id="dest-path" class="path-info">Selecionar Pasta</div>
            </button>
        </div>

        <div class="settings-pane">
            <div class="settings-grid">
                <div>
                    <label class="check-box">
                        <input type="checkbox" id="enable-time-corr"> Correção de Horário
                    </label>
                    <div class="time-box" style="margin-top: 15px;">
                        <input type="number" id="off-h" placeholder="H" value="0">
                        <input type="number" id="off-m" placeholder="M" value="0">
                        <input type="number" id="off-s" placeholder="S" value="0">
                    </div>
                </div>
                <div>
                    <label>Nome</label>
                    <input type="text" id="custom-name" placeholder="Ex: João">
                    <label class="check-box">
                        <input type="checkbox" id="keep-original" checked> Manter Nome Original
                    </label>
                </div>
            </div>
        </div>

        <button id="start-btn" class="execute-btn" onclick="startOrganizing()">Organizar Memórias</button>

        <div id="status-area">
            <div id="status-msg" style="font-weight: 800; text-transform: uppercase; letter-spacing: 2px;">Pronto</div>
            <div id="prog-track">
                <div id="prog-fill"></div>
            </div>
            <div id="log-feed"></div>
        </div>
    </div>

    <script>
        let sourceHandle = null;
        let destHandle = null;

        async function selectFolder(type) {
            try {
                const handle = await window.showDirectoryPicker();
                if (type === 'source') {
                    sourceHandle = handle;
                    document.getElementById('source-path').innerText = handle.name.toUpperCase();
                } else {
                    destHandle = handle;
                    document.getElementById('dest-path').innerText = handle.name.toUpperCase();
                }
            } catch (err) { }
        }

        function log(msg) {
            const feed = document.getElementById('log-feed');
            feed.innerHTML += `<div>• ${msg.toUpperCase()}</div>`;
            feed.scrollTop = feed.scrollHeight;
        }

        async function getFilesRecursively(handle, path = '') {
            const files = [];
            for await (const entry of handle.values()) {
                if (entry.kind === 'file') {
                    files.push({ handle: entry, path: path + entry.name });
                } else if (entry.kind === 'directory') {
                    const subFiles = await getFilesRecursively(entry, path + entry.name + '/');
                    files.push(...subFiles);
                }
            }
            return files;
        }

        async function getDestFolder(rootHandle, year, month) {
            const yearHandle = await rootHandle.getDirectoryHandle(year, { create: true });
            const monthHandle = await yearHandle.getDirectoryHandle(`${year}_${month}`, { create: true });
            return monthHandle;
        }

        async function startOrganizing() {
            if (!sourceHandle || !destHandle) {
                alert('SELECIONE AS PASTAS PRIMEIRO.');
                return;
            }

            const startBtn = document.getElementById('start-btn');
            const progTr = document.getElementById('prog-track');
            const progFi = document.getElementById('prog-fill');
            const status = document.getElementById('status-msg');

            startBtn.disabled = true;
            progTr.style.display = 'block';
            document.getElementById('log-feed').innerHTML = '';
            log('A ANALISAR AS SUAS FOTOS...');

            const files = await getFilesRecursively(sourceHandle);
            let copied = 0;

            const timeCorr = document.getElementById('enable-time-corr').checked;
            const offH = parseInt(document.getElementById('off-h').value) || 0;
            const offM = parseInt(document.getElementById('off-m').value) || 0;
            const offS = parseInt(document.getElementById('off-s').value) || 0;
            const customName = document.getElementById('custom-name').value.trim();
            const keepOriginal = document.getElementById('keep-original').checked;

            const supportedExtensions = ['.jpg', '.jpeg', '.png', '.heic', '.webp', '.mov', '.mp4'];

            for (let i = 0; i < files.length; i++) {
                const fileEntry = files[i];
                const file = await fileEntry.handle.getFile();
                const ext = '.' + file.name.split('.').pop().toLowerCase();

                if (!supportedExtensions.includes(ext)) continue;

                status.innerText = `A PROCESSAR: ${file.name.substring(0, 15)}...`;
                progFi.style.width = `${((i + 1) / files.length) * 100}%`;

                try {
                    let date = null;
                    if (['.jpg', '.jpeg', '.heic'].includes(ext)) {
                        try {
                            const exif = await exifr.parse(file);
                            if (exif && (exif.DateTimeOriginal || exif.CreateDate)) {
                                date = new Date(exif.DateTimeOriginal || exif.CreateDate);
                            }
                        } catch (e) { }
                    }
                    if (!date || isNaN(date.getTime())) date = new Date(file.lastModified);

                    if (timeCorr) {
                        date.setHours(date.getHours() + offH);
                        date.setMinutes(date.getMinutes() + offM);
                        date.setSeconds(date.getSeconds() + offS);
                    }

                    const y = date.getFullYear().toString();
                    const m = (date.getMonth() + 1).toString().padStart(2, '0');
                    const d = date.getDate().toString().padStart(2, '0');
                    const hms = date.getHours().toString().padStart(2, '0') +
                        date.getMinutes().toString().padStart(2, '0') +
                        date.getSeconds().toString().padStart(2, '0');

                    let nameParts = [`${y}${m}${d}_${hms}`];
                    if (customName) nameParts.push(customName);
                    if (keepOriginal) nameParts.push(file.name.replace(/\.[^/.]+$/, ""));

                    const newName = nameParts.join(' - ') + ext;

                    const targetDir = await getDestFolder(destHandle, y, m);
                    const newFileHandle = await targetDir.getFileHandle(newName, { create: true });
                    const writable = await newFileHandle.createWritable();
                    await writable.write(file);
                    await writable.close();

                    copied++;
                    log(`OK: ${newName}`);
                } catch (err) {
                    log(`ERRO: ${file.name}`);
                }
            }

            status.innerText = 'ORGANIZAÇÃO COMPLETA!';
            startBtn.disabled = false;

            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#1e3799', '#b71540', '#ffffff']
            });
        }
    </script>
</body>

</html>
